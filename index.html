<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Attendance Tracker Pro</title>
    <link rel="icon" type="image/png" href="people.png">


 <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --bg-color: #e0e5ec;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --accent: #6c5ce7;
            --success: #00b894;
            --danger: #ff7675;
            --clay-box: 20px 20px 40px #bec3c9, -20px -20px 40px #ffffff;
            --clay-inset: inset 6px 6px 12px #bec3c9, inset -6px -6px 12px #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            overflow: hidden; /* Prevents scrollbars from bouncing balls */
            position: relative;
        }

        /* 🟢 CUTE 3D BALLS */
        .cute-ball {
            position: absolute;
            top: 0; left: 0;
            border-radius: 50%;
            z-index: -1;
            pointer-events: none; /* Let clicks pass through */
            will-change: transform;
            /* 3D sphere illusion */
            box-shadow: 
                inset -20px -20px 40px rgba(0,0,0,0.15),
                inset 10px 10px 30px rgba(255,255,255,0.7),
                15px 15px 30px rgba(0,0,0,0.1);
        }

        /* Ball Colors */
        .ball-purple { background: radial-gradient(circle at 30% 30%, #dcd1ff, #a29bfe); }
        .ball-green { background: radial-gradient(circle at 30% 30%, #b8f2e6, #55efc4); }
        .ball-pink { background: radial-gradient(circle at 30% 30%, #ffeaa7, #fab1a0); }

        /* Cute Face Wrapper */
        .face {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        /* Blinking Eyes */
        .eye {
            width: 10px; height: 10px;
            background-color: #2d3436;
            border-radius: 50%;
            animation: blink 4s infinite;
        }

        /* Cute Smile */
        .mouth {
            width: 12px; height: 8px;
            border-bottom: 3px solid #2d3436;
            border-radius: 50%;
            margin-bottom: 2px;
        }

        @keyframes blink {
            0%, 95%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }

        /* Dashboard Container for scrolling since body is hidden */
        .scroll-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            overflow-y: auto;
            padding: 2rem;
            z-index: 1;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            max-width: 800px;
            margin: 0 auto 3rem auto;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        /* Input Section */
        .input-section {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 25px;
            box-shadow: var(--clay-box);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin: 0 auto 3rem auto;
            max-width: 900px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            padding-left: 0.5rem;
        }

        input {
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 15px;
            background: var(--bg-color);
            box-shadow: var(--clay-inset);
            font-size: 1rem;
            outline: none;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        input[type="text"] { width: 250px; }
        input[type="number"] { width: 120px; }

        input:focus {
            box-shadow: inset 8px 8px 16px #bec3c9, inset -8px -8px 16px #ffffff;
        }

        button.add-btn {
            padding: 1rem 2rem;
            margin-top: 1.5rem;
            border: none;
            border-radius: 15px;
            background: var(--accent);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 8px 8px 16px rgba(108, 92, 231, 0.3), -8px -8px 16px rgba(255,255,255,0.8);
            transition: all 0.2s ease;
        }

        button.add-btn:active {
            transform: scale(0.95);
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2.5rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem; 
        }

        /* Pop-Out Hover Effect */
        .card {
            background: var(--bg-color);
            border-radius: 25px;
            box-shadow: var(--clay-box);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), 
                        box-shadow 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        z-index 0s;
        }

        .card:hover {
            transform: scale(1.08) translateY(-10px);
            box-shadow: 25px 25px 50px #b0b5bc, -25px -25px 50px #ffffff;
            z-index: 10;
        }

        .card-banner {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid rgba(255,255,255,0.5);
            margin-bottom: 1rem;
            position: relative;
        }

        .card-banner::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 50%;
            background: linear-gradient(to top, var(--bg-color), transparent);
        }

        .card-content {
            padding: 0 2rem 2rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .delete-btn {
            position: absolute;
            top: 15px; right: 15px;
            width: 35px; height: 35px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            color: var(--danger);
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
        }
        
        .delete-btn:hover { 
            transform: scale(1.15); 
            background: #ff7675;
            color: white;
        }

        .subject-name {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 2;
        }

        /* Circular Progress */
        .progress-ring {
            width: 110px; height: 110px;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: var(--clay-box);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .progress-ring::before {
            content: '';
            position: absolute;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: var(--clay-inset);
        }

        .percentage {
            position: relative;
            font-size: 1.3rem;
            font-weight: 800;
            z-index: 1;
        }

        /* Stats & Controls */
        .stats {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            width: 100%;
            justify-content: center;
        }

        .stat-col {
            text-align: center;
            background: var(--bg-color);
            box-shadow: var(--clay-inset);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            flex: 1;
        }

        .stat-val { font-size: 1.2rem; font-weight: 700; color: var(--text-main); }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}

        .controls {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .controls button {
            flex: 1;
            padding: 0.8rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            background: var(--bg-color);
            color: var(--text-main);
            box-shadow: 5px 5px 10px #bec3c9, -5px -5px 10px #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }
        
        .controls button:active {
            box-shadow: var(--clay-inset);
            transform: scale(0.95);
        }

        .controls .btn-present { color: var(--success); }
        .controls .btn-absent { color: var(--danger); }

        .status-msg {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            padding: 0.8rem;
            border-radius: 12px;
            width: 100%;
            box-shadow: var(--clay-inset);
        }

        .status-safe { color: var(--success); }
        .status-danger { color: var(--danger); }
        
    </style>
</head>
<body>

    <!-- 🟢 Three Cute 3D Balls -->
    <div class="cute-ball ball-purple" id="ball1" style="width: 180px; height: 180px;">
        <div class="face"><div class="eye"></div><div class="mouth"></div><div class="eye"></div></div>
    </div>
    <div class="cute-ball ball-green" id="ball2" style="width: 140px; height: 140px;">
        <div class="face"><div class="eye"></div><div class="mouth"></div><div class="eye"></div></div>
    </div>
    <div class="cute-ball ball-pink" id="ball3" style="width: 160px; height: 160px;">
        <div class="face"><div class="eye"></div><div class="mouth"></div><div class="eye"></div></div>
    </div>

    <!-- UI wrapped in scroll container -->
    <div class="scroll-container">
        <header>
            <h1>Semester Tracker 🎓</h1>
            <div class="subtitle">Add subjects, track bunks, and survive the semester.</div>
        </header>

        <div class="input-section">
            <div class="input-group">
                <label for="subjectInput">Subject Name</label>
                <input type="text" id="subjectInput" placeholder="e.g. Web Technology">
            </div>
            <div class="input-group">
                <label for="attendedInput">Classes Attended</label>
                <input type="number" id="attendedInput" placeholder="0" min="0">
            </div>
            <div class="input-group">
                <label for="totalInput">Total Classes Held</label>
                <input type="number" id="totalInput" placeholder="0" min="0">
            </div>
            <button class="add-btn" onclick="addSubject()">+ Add Module</button>
        </div>

        <div class="grid" id="dashboard">
            <!-- Cards injected via JS -->
        </div>
    </div>

    <script>
        // 🟢 60FPS RANDOM PHYSICS ENGINE FOR BALLS
        const ballsData = [
            { id: 'ball1', size: 180, x: Math.random() * (window.innerWidth - 180), y: Math.random() * (window.innerHeight - 180), vx: 1.2, vy: 0.8 },
            { id: 'ball2', size: 140, x: Math.random() * (window.innerWidth - 140), y: Math.random() * (window.innerHeight - 140), vx: -0.9, vy: 1.1 },
            { id: 'ball3', size: 160, x: Math.random() * (window.innerWidth - 160), y: Math.random() * (window.innerHeight - 160), vx: 1.0, vy: -1.3 }
        ];

        function animateBalls() {
            ballsData.forEach(ball => {
                ball.x += ball.vx;
                ball.y += ball.vy;

                // Bounce mechanics (Reverse velocity when hitting screen edges)
                if (ball.x <= 0 || ball.x + ball.size >= window.innerWidth) ball.vx *= -1;
                if (ball.y <= 0 || ball.y + ball.size >= window.innerHeight) ball.vy *= -1;

                // Apply hardware-accelerated movement
                document.getElementById(ball.id).style.transform = `translate3d(${ball.x}px, ${ball.y}px, 0)`;
            });
            requestAnimationFrame(animateBalls); // Fires at exactly 60fps
        }
        
        // Start animation loop
        animateBalls();

        // Handle Window Resizing so balls don't get stuck outside
        window.addEventListener('resize', () => {
            ballsData.forEach(ball => {
                if (ball.x + ball.size > window.innerWidth) ball.x = window.innerWidth - ball.size;
                if (ball.y + ball.size > window.innerHeight) ball.y = window.innerHeight - ball.size;
            });
        });

        // ----------------------------------------------------
        // ATTENDANCE LOGIC
        // ----------------------------------------------------
        const aestheticImages = [
            "https://images.unsplash.com/photo-1517842645767-c639042777db?auto=format&fit=crop&w=600&q=80", 
            "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=600&q=80", 
            "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=600&q=80", 
            "https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=600&q=80", 
            "https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&w=600&q=80", 
            "https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=600&q=80", 
            "https://images.unsplash.com/photo-1588508065123-287b28e0131b?auto=format&fit=crop&w=600&q=80", 
            "https://images.unsplash.com/photo-1456406644174-8ddd4cd52a06?auto=format&fit=crop&w=600&q=80"  
        ];

        let subjects = JSON.parse(localStorage.getItem('attendanceData')) || [];

        function saveToLocal() {
            localStorage.setItem('attendanceData', JSON.stringify(subjects));
        }

        function addSubject() {
            const nameInput = document.getElementById('subjectInput');
            const attendedInput = document.getElementById('attendedInput');
            const totalInput = document.getElementById('totalInput');
            
            const name = nameInput.value.trim();
            const present = parseInt(attendedInput.value) || 0;
            const total = parseInt(totalInput.value) || 0;
            const absent = total - present;

            if (!name) { alert("Please enter a subject name!"); return; }
            if (present < 0 || total < 0) { alert("Values cannot be negative!"); return; }
            if (present > total) { alert("You cannot attend more classes than the total held!"); return; }

            const imgIndex = Math.floor(Math.random() * aestheticImages.length);
            
            subjects.push({ 
                id: Date.now(), 
                name, present, absent,
                bannerUrl: aestheticImages[imgIndex]
            });
            
            nameInput.value = ''; attendedInput.value = ''; totalInput.value = '';
            
            saveToLocal();
            render();
        }

        function deleteSubject(id) {
            if(confirm("Are you sure you want to drop this subject? All attendance data will be lost.")) {
                subjects = subjects.filter(s => s.id !== id);
                saveToLocal();
                render();
            }
        }

        function updateAttendance(id, type, amount) {
            const index = subjects.findIndex(s => s.id === id);
            if (index === -1) return;

            if (type === 'present') subjects[index].present = Math.max(0, subjects[index].present + amount);
            else subjects[index].absent = Math.max(0, subjects[index].absent + amount);
            
            saveToLocal();
            render();
        }

        function render() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';

            subjects.forEach(subject => {
                const total = subject.present + subject.absent;
                let percentage = 0;
                if (total > 0) percentage = (subject.present / total) * 100;

                const ringColor = percentage >= 75 ? 'var(--success)' : (total === 0 ? 'var(--text-muted)' : 'var(--danger)');
                const gradient = `conic-gradient(${ringColor} ${percentage * 3.6}deg, transparent 0deg)`;

                let statusText = "No classes recorded yet. 📚";
                let statusClass = "";

                if (total > 0) {
                    if (percentage >= 75) {
                        const bunksAvailable = Math.floor((subject.present - 3 * subject.absent) / 3);
                        if (bunksAvailable > 0) {
                             statusText = `Safe! ☕ You can bunk ${bunksAvailable} class${bunksAvailable > 1 ? 'es' : ''}.`;
                             statusClass = "status-safe";
                        } else {
                            statusText = `On the dot! 🎯 Don't bunk the next one.`;
                            statusClass = "status-safe";
                        }
                    } else {
                        const classesNeeded = Math.ceil(3 * subject.absent - subject.present);
                        statusText = `Danger! 🚨 Need to attend ${classesNeeded} more class${classesNeeded > 1 ? 'es' : ''}.`;
                        statusClass = "status-danger";
                    }
                }

                const imgUrl = subject.bannerUrl || aestheticImages[0];

                dashboard.innerHTML += `
                    <div class="card">
                        <button class="delete-btn" onclick="deleteSubject(${subject.id})" title="Delete Subject">✕</button>
                        
                        <div class="card-banner" style="background-image: url('${imgUrl}')"></div>
                        
                        <div class="card-content">
                            <h2 class="subject-name" title="${subject.name}">${subject.name}</h2>
                            
                            <div class="progress-ring" style="background: ${gradient}">
                                <span class="percentage" style="color: ${ringColor}">${percentage.toFixed(0)}%</span>
                            </div>

                            <div class="stats">
                                <div class="stat-col"><div class="stat-val">${subject.present}</div><div class="stat-label">Present</div></div>
                                <div class="stat-col"><div class="stat-val">${subject.absent}</div><div class="stat-label">Absent</div></div>
                                <div class="stat-col"><div class="stat-val">${total}</div><div class="stat-label">Total</div></div>
                            </div>

                            <div class="controls">
                                <button class="btn-present" onclick="updateAttendance(${subject.id}, 'present', 1)">+ Present</button>
                                <button class="btn-absent" onclick="updateAttendance(${subject.id}, 'absent', 1)">+ Absent</button>
                            </div>
                            
                            <div class="status-msg ${statusClass}">${statusText}</div>
                        </div>
                    </div>
                `;
            });
        }
        render();
    </script>
</body>
</html>
